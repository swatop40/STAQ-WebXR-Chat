name: staq-webxr-chat
region: nyc
services:
  - name: web
    github:
      repo: swatop40/STAQ-WebXR-Chat
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /healthz
      port: 3000
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        type: GENERAL
        value: production
      - key: PORT
        scope: RUN_TIME
        type: GENERAL
        value: "3000"
      - key: CORS_ORIGIN
        scope: RUN_TIME
        type: GENERAL
        value: https://st-aq.com
      - key: STUN_URLS
        scope: RUN_TIME
        type: GENERAL
        value: stun:stun.l.google.com:19302
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
