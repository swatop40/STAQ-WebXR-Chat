<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>staqwebxrchat | Choose Scene</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #0f172a;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      #joinOverlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        z-index: 10;
      }

      #joinCard {
        width: min(420px, 90vw);
        padding: 28px 24px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 14px;
        text-align: center;
      }

      #joinCard h1 {
        margin: 0;
        font-size: 1.8rem;
        line-height: 1.25;
        color: #111827;
      }

      #sceneButtons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }

      .sceneButton {
        width: 100%;
        padding: 12px 14px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .sceneButton:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <div id="joinOverlay">
      <div id="joinCard">
        <h1>please choose your desired environment</h1>

        <div id="sceneButtons">
          <button class="sceneButton" data-scene="start">
            Start Scene / Testing Scene
             <div id="count-start" style="font-size:0.85rem; opacity:0.8;">0/3</div>
          </button>

          <button class="sceneButton" data-scene="bar">
            Bar and Kareoke Scene
            <div id="count-bar" style="font-size:0.85rem; opacity:0.8;">0/3</div>
          </button>

          <button class="sceneButton" data-scene="parking">
            Parking Lot Scene
            <div id="count-parking" style="font-size:0.85rem; opacity:0.8;">0/3</div>
          </button>
        </div>
      </div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script type="module">
      import { launchApp, setSceneLoader } from "/src/main.js";
      import { loadScene as loadStartScene } from "/src/scenes/start.js";
      import { loadScene as loadBarScene } from "/src/scenes/bar.js";
      import { loadScene as loadParkingScene } from "/src/scenes/parking-WIP.js";
      import { io } from "socket.io-client";

      const socket = io();

      socket.on("sceneCounts", (counts) => {
        const max = 3;

        socket.on("sceneFull", ({ sceneId, max }) => {
        alert(`The ${sceneId} scene is full (${max} players). Please choose another scene.`);
      });


        const scenes = ["start", "bar", "parking"];
        scenes.forEach((scene) => {
          const count = counts[scene] || 0;
          const label = document.getElementById(`count-${scene}`);
          const btn = document.querySelector(`button[data-scene="${scene}"]`);

          if (label) {
            label.textContent = `${count}/${max}`;
          }

          if (btn) {
            btn.disabled = count >= max;
            btn.style.background = count >= max ? "#6b7280" : "#2563eb";
            btn.style.cursor = count >= max ? "not-allowed" : "pointer";
          }
        });
      });


      const overlay = document.getElementById("joinOverlay");
      const buttons = document.querySelectorAll(".sceneButton");

      const sceneLoaders = {
        start: loadStartScene,
        bar: loadBarScene,
        parking: loadParkingScene,
      };

      buttons.forEach((btn) => {
        btn.addEventListener("click", async () => {
          const sceneKey = btn.dataset.scene;
          const loadScene = sceneLoaders[sceneKey];
          if (!loadScene) return;

          buttons.forEach((button) => {
            button.disabled = true;
          });

          setSceneLoader(loadScene);
          overlay.style.display = "none";

          await launchApp({
              playerName: sessionStorage.getItem("nameInput") || "Player",
              sceneId: sceneKey,
            });
        });
      });
    </script>

  </body>
</html>
